runner: claude-mcp
mcp_config: |
  {
    "mcpServers": {
      "sightmap": {
        "command": "node",
        "args": [
          "/Users/chip/src/sightmap/sightmap-js/packages/mcp/dist/cli.js",
          "--sightmap-dir", "{{REPO_ROOT}}/bench/apps/.sightmap",
          "--sightmap-dir", "{{REPO_ROOT}}/bench/apps/apps/medcart/.sightmap",
          "--",
          "-y", "@playwright/mcp@latest", "--isolated"
        ]
      }
    }
  }
tool_prefix: "mcp__sightmap"
sightmap_files:
  - bench/apps/.sightmap/todo.yaml
  - bench/apps/.sightmap/topwork.yaml
  - bench/apps/apps/medcart/.sightmap/medcart.yaml
prompt_insert: |
  Use the `sightmap` MCP tools for all browser interaction. They wrap
  the standard @playwright/mcp surface and add sightmap awareness:

  - `sightmap_match(url)`: planning query — returns the matched view
    name, applicable components (with their selectors and memory), and
    page memory for any URL. Use BEFORE navigating to learn what to
    expect.
  - `sightmap_snapshot()`: returns the upstream ARIA snapshot enriched
    with sightmap component names attached, plus matchCount per
    component (so you know how many instances exist on the current
    page) and each component's memory. Prefer this over browser_snapshot.
  - `sightmap_act(componentName, action, [text], [submit], [instance])`:
    semantic action — "click on AddToCartButton" instead of "click on
    ref e7". Resolves the component to a CSS selector, tags the Nth
    match, and dispatches via the upstream's selector-based action.
    Use `instance` (zero-based) to disambiguate when matchCount > 1.
  - `sightmap_network_requests([static], [filter])`: returns recent
    network calls annotated with sightmap names + memory where they
    match a sightmap `requests:` entry.

  All standard browser_* tools (browser_navigate, browser_click, etc.)
  are still available as a fallback for things outside the sightmap.
tags: [mcp, sightmap, oss]
