            description: "'Messages' title and search input"
          - name: SidebarSearch
            selector: ".sidebar-header input"
            description: "Search input, placeholder='Search messages...'."
            memory:
              - "STUB: not functional."
          - name: ConversationsList
            selector: ".conversations-list"
            description: "Scrollable list of conversation previews"
          - name: ConversationItem
            selector: ".conversation-item"
            description: >
