  # ========================================
  # SEND OFFER
  # ========================================

  - name: SendOffer
    selector: ".send-offer"
    source: apps/topwork/components/SendOffer.tsx
    description: >
      Form page for sending a contract offer to a freelancer. Two-column layout:
      main form (left) and FAQ (right). All form fields are functional.
    memory:
      - "HOW TO USE: (1) Click job select → press first letter of job name → snapshot to verify. (2) Fill contract title. (3) Click RadioLabel for payment type. (4) Fill rate/price — Control+A first if pre-filled, to avoid appending. (5) Fill description. (6) Click Continue. Tab is NOT needed here — Continue reads values on click."
      - "Navigate here via Hire button on profile or URL /platform/offer/?id={freelancerId}."
    children:
      - name: OfferContainer
        selector: ".offer-container"
        description: "Centered container for the offer form"
      - name: OfferHeading
        selector: ".send-offer h1"
        description: "Page heading 'Send an offer'"
      - name: FreelancerSummary
        selector: ".freelancer-summary"
        description: >
          Small card showing avatar, name, and title of the freelancer being offered.
      - name: OfferForm
        selector: ".offer-form"
        description: >
          The main form element containing all contract fields. It's a <form> tag
          but submission is via the Continue button's onClick, not form submit.
        memory:
          - "Does NOT submit on Enter — click Continue button."
        children:
          - name: JobSelectSection
            selector: ".send-offer .form-section:first-child"
            description: "Dropdown to select which job this contract is for."
            memory:
              - "Click to focus, press first letter of option (e.g. 'e' for E-commerce). Snapshot to verify selection before proceeding."
              - "hiringFlow jobs: 'job-ecom' (E-commerce Platform Development), 'job-mobile' (Mobile App Development)."
          - name: ContractTitleSection
            selector: ".send-offer .form-section:nth-child(2)"
            description: "Text input for contract title."
            memory:
              - "Fill title text. Continue button enables when non-empty. Tab NOT required — Continue reads values on click."
          - name: HiringTeamSection
            selector: ".send-offer .form-section:nth-child(3)"
            description: "Text input for hiring team/manager name. Default: 'Shaun VanWeldeen'."
          - name: PaymentTypeSection
            selector: ".send-offer .form-section:nth-child(4)"
            description: "Radio buttons for payment type: 'Pay by the hour' or 'Pay a fixed price'."
            memory:
              - "Click RadioLabel to select. Default is hourly; click 'Pay a fixed price' to switch."
          - name: RadioLabel
            selector: ".radio-label"
            description: >
              Label wrapping a radio input. Contains <strong> for label text
              and <p> for description.
            memory:
              - "Click label to select — do not click the radio input directly."
          - name: PaymentDetails
            selector: ".payment-details"
            description: >
              Conditional section showing either hourly rate fields or fixed price
              fields based on selected payment type.
            memory:
              - "Enter numbers only (e.g. '50' or '5000'). Currency formatting is automatic. Control+A before fill if field has a pre-existing value."
          - name: InputGroup
            selector: ".send-offer .input-group"
            description: "Flex row with currency prefix/suffix and input field."
          - name: CurrencySymbol
            selector: ".currency"
            description: "Dollar sign ($) prefix in rate/price inputs"
          - name: RateSuffix
            selector: ".suffix"
            description: "Suffix text like '/hr' after hourly rate input"
          - name: WeeklyLimitCheckbox
            selector: ".weekly-limit input[type='checkbox']"
            description: "Checkbox to enable weekly hour limit"
            memory:
              - "Optional. Click to toggle."
          - name: AutoPaymentCheckbox
            selector: ".automatic-payment input[type='checkbox']"
            description: "Checkbox to enable automatic milestone payment"
            memory:
              - "Optional. Only visible for Fixed Price. Click to toggle."
          - name: DescriptionTextarea
            selector: ".send-offer textarea"
            description: "Large textarea for contract description / work requirements."
            memory:
              - "Fill with description text."
          - name: AttachLink
            selector: ".attach-link"
            description: "Link labeled 'Attach a file'."
            memory:
              - "STUB: not functional."
          - name: FormActions
            selector: ".form-actions"
            description: "Flex row with Cancel and Continue buttons"
            children:
              - name: CancelButton
                selector: ".cancel-btn"
                description: "Outline button. Navigates back to previous page."
                memory:
                  - "Click to go back to the freelancer profile."
              - name: ContinueButton
                selector: ".continue-btn"
                description: "Green submit button. Disabled when contract title is empty."
                memory:
                  - "Click to submit. Disabled until contract title has text. Redirects to Messages with contract notice."
      - name: SendOfferFAQ
        selector: ".send-offer .faq-section"
        description: >
          Accordion FAQ section using native <details>/<summary> elements.
        memory:
          - "Click <summary> to expand/collapse. Static content."

  # ========================================
  # MESSAGES
  # ========================================

  - name: Messages
