views:
  - name: Dashboard
    route: "/apps/topwork/?scenario={scenario}"
    description: "Scenarios: default, hiringFlow. Navigating resets all state."

  - name: FreelancerProfile
    route: "/freelancer/?id={freelancerId}"
    description: "IDs: charlesdavis, sarahw, mikej, briank, carola, chriso."

  - name: SendOffer
    route: "/platform/offer/?id={freelancerId}"
    description: "Reached via Hire button on profile."

  - name: Messages
    route: "/apps/topwork/messages/?scenario={scenario}&id={freelancerId}"
    description: "ALWAYS include ?scenario= to preserve data. Sidebar clicks fail; use URL only."

  - name: OfferSent
    route: "/offer/sent/?id={contractId}"
    description: "Reached via SendOffer submit or 'View details' on contract notices."

  - name: JobPostWizard
    route: "/job-post/new?step={step}"
    description: "Steps: Title → Skills → Scope → Budget → Description."
