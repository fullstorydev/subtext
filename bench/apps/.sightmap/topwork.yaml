version: 1

memory:
  - "QUICK REFERENCE: (1) TEXT INPUTS — fill then Tab before clicking Next/Submit (Preact blur validation). (2) CONVERSATIONS — sidebar clicks fail; use URL: /apps/topwork/messages/?scenario={scenario}&id={freelancerId}. IDs: charlesdavis, sarahw, mikej, briank, carola, chriso. (3) RADIOS — click .radio-label card, not the input. (4) JOB SELECT — click to focus, press first letter (e.g. 'e' for E-commerce). (5) RATE INPUTS — if pre-filled, Control+A before fill to avoid appending."
  - "Preact fires onChange only on blur. After fill on any text/number input, press Tab to trigger validation. Without this, Next/Submit buttons stay disabled. This applies in the JobPostWizard only — SendOffer reads values on click and does NOT need Tab."
  - "Scenarios via ?scenario= param: default (4 jobs, 6 freelancers), hiringFlow (2 jobs, 3 freelancers, pending contract with Charles D.). Navigating resets all in-memory state."

components:
  # ========================================
  # LAYOUT
  # ========================================

  - name: TopworkApp
    selector: ".topwork-app"
    source: apps/topwork/components/TopworkApp.tsx
    description: >
      Root container for the TopWork freelancing platform. Min-height 100vh,
      light gray background (#f7f7f7). Contains Header, MainContent, and Footer.
      Manages all app state and SPA routing via pushState.
    memory:
      - "STATE: All data is in-memory. Refreshing or navigating to /apps/topwork/?scenario=X resets everything. Within a session, use Logo clicks or nav links to move between pages. Exception: Messages requires URL navigation — always include ?scenario= to preserve state (see Messages memory)."
      - "Use MCP devtools tools only. Do not fall back to Playwright, Bash, or evaluate_script workarounds."
    children:
      - name: MainContent
        selector: ".main-content"
        description: >
          Page content area between header and footer. Max-width 1440px, centered.
          Renders one page component at a time based on current route.

  # ========================================
  # HEADER
  # ========================================

  - name: Header
    selector: ".topwork-app > .header"
    source: apps/topwork/components/Header.tsx
    description: >
      Sticky top navigation bar (position:sticky, z-index:100). White background
      with bottom border. Contains logo, search, navigation, and action buttons.
    children:
      - name: HeaderContent
        selector: ".header-content"
        description: "Inner flex container, max-width 1440px, padding 16px 20px"
      - name: Logo
        selector: ".logo"
        description: >
          SVG logo with green circle and "Topwork" text. Clickable — navigates
          back to the dashboard.
        memory:
          - "Click to return to dashboard. Preserves current scenario state."
      - name: SearchContainer
        selector: ".search-container"
        description: >
          Search box with green-tinted background, rounded corners. Contains text
          input and type selector. Width 300px.
        memory:
          - "STUB: not functional."
        children:
          - name: SearchInput
            selector: ".search-input"
            description: "Text input, placeholder='Search'. No border, transparent background."
            memory:
              - "STUB: not functional."
          - name: SearchTypeSelector
            selector: ".search-type-selector"
            description: "Dropdown trigger container, position:relative"
          - name: SearchTypeButton
            selector: ".search-type-btn"
            description: >
              Shows current search type ("Jobs" or "Projects") with down arrow.
              Opens dropdown on hover (not click).
            memory:
              - "STUB: hover opens dropdown but search is non-functional."
          - name: SearchDropdown
            selector: ".search-dropdown"
            description: >
              Appears on hover. Contains Jobs, Projects, and Talent options.
      - name: MainNav
        selector: ".main-nav"
        description: >
          Primary navigation with 4 items: Jobs, Talent, Reports (all have hover
          dropdowns), and Messages (direct link). Flex:1 to fill middle space.
        memory:
          - "Dropdowns open on HOVER, not click. Only 'Post a job' and 'Messages' actually navigate — all others are stubs."
        children:
          - name: NavItem
            selector: ".nav-item"
            description: >
              Wrapper div with position:relative for dropdown positioning.
              Dropdown opens on mouseEnter, closes on mouseLeave.
          - name: NavLink
            selector: ".nav-link"
            description: "Navigation text link. Color #5e6d55, transitions to #001e00 on hover."
          - name: ActiveNavLink
            selector: ".nav-link.active"
            description: "Currently active nav link. Color #001e00, green bottom border."
          - name: NavDropdown
            selector: ".nav-dropdown"
            description: >
              Dropdown submenu, appears below nav item on hover. White background,
              rounded corners, shadow. Contains .dropdown-item links.
            memory:
              - "Only 'Post a job' works. All other items are stubs."
          - name: DropdownItem
            selector: ".dropdown-item"
            description: "Menu item in any dropdown. Padding 8px 12px, border-radius 4px."
          - name: DropdownDivider
            selector: ".dropdown-divider"
            description: "1px horizontal line separating dropdown sections"
      - name: HeaderActions
        selector: ".header-actions"
        description: "Right-side flex group: Post Job button, notifications, user menu"
        children:
          - name: HeaderPostJobButton
            selector: ".header-actions .post-job-btn"
            description: >
              Green button labeled "Post a job". Background #14a800, white text, rounded corners.
            memory:
              - "Click to open the job post wizard."
          - name: NotificationsIcon
            selector: ".notifications"
            description: "Bell SVG icon. Color #5e6d55, darkens on hover."
            memory:
              - "STUB: not functional."
          - name: UserMenu
            selector: ".user-menu"
            description: "Container for user avatar."
            memory:
              - "STUB: not functional."
            children:
              - name: HeaderAvatar
                selector: ".user-menu .avatar"
                description: "32x32 green circle with white initial letter of user name."

