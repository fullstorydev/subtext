      - "HOW TO USE: Switch conversations via URL only — sidebar clicks always fail. Navigate to /apps/topwork/messages/?scenario={scenario}&id={freelancerId}. Always include ?scenario= to preserve loaded data (without it, contract notices and message history disappear). IDs: charlesdavis, sarahw, mikej, briank, carola, chriso."
      - "Navigate here via Messages nav link, Message button on a profile, or after submitting an offer."
    children:
      - name: MessagesContainer
        selector: ".messages-container"
        description: "Flex row containing all three panes"
      - name: ConversationsSidebar
        selector: ".conversations-sidebar"
        description: >
          Left pane, fixed width. Header with "Messages" title and search input,
